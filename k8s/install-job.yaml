# One-shot Job to download the Last Oasis dedicated server files
# into the PVC. Run BEFORE the deployment, and again after `update`
# or whenever the game files need re-validating.
#
# Usage:
#   kubectl apply -f install-job.yaml
#   kubectl -n last-oasis logs -f job/last-oasis-1-install
#
# The job auto-cleans 1 hour after completion. Re-apply to run again
# (the existing finished job will be replaced).

apiVersion: batch/v1
kind: Job
metadata:
  name: last-oasis-1-install
  namespace: last-oasis
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        oasis: last-oasis-1

      securityContext:
        runAsUser: 1000
        runAsGroup: 1001
        fsGroup: 1001

      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              set -eu
              chown -R 1000:1001 /mnt/steam
              chmod -R 775 /mnt/steam
          volumeMounts:
            - name: data
              mountPath: /mnt/steam

      containers:
        - name: install
          image: ghcr.io/drsaluml/last-oasis-docker-dedicated-server:latest
          imagePullPolicy: Always

          args:
            - install

          securityContext:
            seccompProfile:
              type: Unconfined

          env:
            # Anonymous downloads frequently fail the first attempt;
            # the wrapper retries with backoff. Bump for slower nodes.
            - name: DOWNLOAD_MAX_ATTEMPTS
              value: "10"

          envFrom:
            - secretRef:
                name: last-oasis-1-secret

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"

          volumeMounts:
            - name: data
              mountPath: /mnt/steam

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: last-oasis-1-data
