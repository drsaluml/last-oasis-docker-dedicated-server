# Last Oasis dedicated server — single replica, hostNetwork, RWO PVC.
#
# To deploy multiple servers, copy this file and replace every
# "last-oasis-1" with the new name (e.g. "last-oasis-2"). Each server
# also needs its own Secret (see secret.yaml.example) and node label
# (kubectl label node <node> oasis=last-oasis-2).

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: last-oasis-1-data
  namespace: last-oasis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 25Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: last-oasis-1
  namespace: last-oasis
  labels:
    app: last-oasis-1
spec:
  # PVC is RWO and the pod claims host ports — never run two copies
  # at once. Recreate guarantees the old pod terminates before the
  # new one starts.
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: last-oasis-1
  template:
    metadata:
      labels:
        app: last-oasis-1
    spec:
      # Pin the pod to the specific node that owns this realm's IP.
      # Label the node first:
      #   kubectl label node <node-name> oasis=last-oasis-1
      nodeSelector:
        oasis: last-oasis-1

      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      # Give the server enough time to flush save data on SIGTERM.
      terminationGracePeriodSeconds: 60

      securityContext:
        runAsUser: 1000
        runAsGroup: 1001
        fsGroup: 1001

      initContainers:
        # Some CSI drivers create the PV root as 0:0 — make sure the
        # steam user (1000:1001) can write to it. steamcmd creates
        # its own subdirectories at runtime; we only need the volume
        # root to be writable.
        - name: fix-permissions
          image: busybox:1.36
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /mnt/steam/backups
              chown -R 1000:1001 /mnt/steam
              chmod -R 775 /mnt/steam
          volumeMounts:
            - name: data
              mountPath: /mnt/steam

      containers:
        - name: server
          image: ghcr.io/drsaluml/last-oasis-docker-dedicated-server:latest
          imagePullPolicy: Always

          # Run the actual server. Default CMD in the image is "help".
          args:
            - run

          # steamcmd needs syscalls that Docker's default seccomp
          # profile blocks on some kernels. Has no effect on the game
          # binary itself.
          securityContext:
            seccompProfile:
              type: Unconfined

          envFrom:
            - secretRef:
                name: last-oasis-1-secret

          # Documented for clarity even though hostNetwork bypasses
          # K8s port mapping.
          ports:
            - name: game-tcp
              containerPort: 62001
              protocol: TCP
            - name: game-udp
              containerPort: 62001
              protocol: UDP
            - name: query-tcp
              containerPort: 27015
              protocol: TCP
            - name: query-udp
              containerPort: 27015
              protocol: UDP

          # The healthcheck script does an A2S_INFO query on the
          # configured Steam query port; the container is unhealthy
          # if the server stops responding to game queries.
          startupProbe:
            exec:
              command: ["python3", "/home/steam/src/healthcheck"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 20    # up to 10 minutes to start
          livenessProbe:
            exec:
              command: ["python3", "/home/steam/src/healthcheck"]
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["python3", "/home/steam/src/healthcheck"]
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            # No limits — UE4 dedicated servers are single-threaded;
            # let the host CPU scheduler share idle cores naturally.

          volumeMounts:
            - name: data
              mountPath: /mnt/steam

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: last-oasis-1-data
